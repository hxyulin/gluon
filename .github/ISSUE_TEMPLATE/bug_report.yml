name: Bug report
description: Report a build failure, incorrect behavior, or crash
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a `gluon.rhai` snippet that triggers the issue
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Gluon version (`gluon --version`):
        - Rust toolchain (`rustc --version`):
        - OS:
      render: text

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste any error messages or build logs
      render: text
